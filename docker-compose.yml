services:
  db:
    image: postgres:17-alpine
    container_name: magnum-opus-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ArtemDohodyaga67
      - POSTGRES_DB=magnum-opus
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U postgres -d magnum-opus',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
